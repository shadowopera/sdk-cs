name: Publish to NuGet and GitHub

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Verify version matches tag
      run: |
        TAG_VER="${GITHUB_REF_NAME#v}"
        CSPROJ_VER=$(grep -oP '(?<=<Version>)[^<]+' src/Archmage/Archmage.csproj)
        PKG_VER=$(grep -oP '(?<="version": ")[^"]+' unity/dev.shadop.archmage/package.json)

        FAIL=0
        if [ "$TAG_VER" != "$CSPROJ_VER" ]; then
          echo "Tag version ($TAG_VER) does not match csproj version ($CSPROJ_VER)"
          FAIL=1
        fi
        if [ "$TAG_VER" != "$PKG_VER" ]; then
          echo "Tag version ($TAG_VER) does not match package.json version ($PKG_VER)"
          FAIL=1
        fi
        if [ "$FAIL" = "1" ]; then
          exit 1
        fi
        echo "Version verified: $TAG_VER"

    - name: Extract changelog
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
        if [ -z "$(echo "$NOTES" | tr -d '[:space:]')" ]; then
          echo "No changelog entry found for version $VERSION"
          exit 1
        fi
        echo "Changelog extracted for $VERSION"
        printf '%s' "$NOTES" > /tmp/release-notes.md

    - name: Restore dependencies
      run: dotnet restore

    - name: Test
      run: dotnet test tests/Archmage.Tests.csproj --configuration Release --no-restore

    - name: Pack NuGet
      run: |
        dotnet pack src/Archmage/Archmage.csproj \
          --configuration Release \
          --output ./artifacts

    - name: Pack Unity tgz
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        mkdir -p artifacts
        tar -czf ./artifacts/unity-dev.shadop.archmage-${VERSION}.tgz \
          -C unity \
          --transform "s|^dev.shadop.archmage/|package/|" \
          dev.shadop.archmage/

    - name: Push to NuGet
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

    - name: Create GitHub Release
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        gh release create "v${VERSION}" \
          --title "v${VERSION}" \
          --notes-file /tmp/release-notes.md \
          ./artifacts/Shadop.Archmage.${VERSION}.nupkg \
          ./artifacts/unity-dev.shadop.archmage-${VERSION}.tgz
      env:
        GH_TOKEN: ${{ github.token }}
