name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Verify version matches tag
      run: |
        TAG_VER="${GITHUB_REF_NAME#v}"
        CSPROJ_VER=$(grep -oP '(?<=<Version>)[^<]+' src/Archmage/Archmage.csproj)
        if [ "$TAG_VER" != "$CSPROJ_VER" ]; then
          echo "Tag version ($TAG_VER) does not match csproj version ($CSPROJ_VER)"
          exit 1
        fi
        echo "Version verified: $CSPROJ_VER"

    - name: Restore dependencies
      run: dotnet restore

    - name: Test
      run: dotnet test tests/Archmage.Tests.csproj --configuration Release --no-restore

    - name: Pack
      run: |
        dotnet pack src/Archmage/Archmage.csproj \
          --configuration Release \
          --output ./artifacts

    - name: Push to NuGet
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ./artifacts/*
